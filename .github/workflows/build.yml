name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build Electron app (Windows)
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteStay-Windows
          path: |
            release/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build Electron app (macOS - both architectures)
        run: npx electron-builder --mac --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteStay-Mac
          path: |
            release/*.dmg
          retention-days: 30

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: LiteStay-Windows
          path: ./release-win

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: LiteStay-Mac
          path: ./release-mac

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-win/*
            ./release-mac/*
          generate_release_notes: true
